<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin · For You Playlist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--surface:#161412;--ink:#f0ece4;
  --ink-soft:rgba(240,236,228,.42);--ink-faint:rgba(240,236,228,.16);
  --accent:#c9a96e;--accent-soft:rgba(201,169,110,.1);--accent-mid:rgba(201,169,110,.28);
  --border:rgba(240,236,228,.07);--border-strong:rgba(240,236,228,.13);
  --red:#e05c4b;--red-soft:rgba(224,92,75,.12);--r:12px;
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

/* ── Gate ── */
#gate{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:24px;
  animation:fadeIn .5s ease;
}
.gate-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:48px 40px;width:340px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.06);
}
.gate-card h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:400;font-style:italic;margin-bottom:6px}
.gate-card p{font-size:.82rem;color:var(--ink-soft);margin-bottom:28px}
.gate-input{
  width:100%;border:1px solid var(--border-strong);border-radius:10px;
  padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;
  background:rgba(255,255,255,.04);color:var(--ink);outline:none;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s;letter-spacing:.12em;text-align:center;
}
.gate-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.gate-err{font-size:.8rem;color:var(--red);margin-top:-8px;margin-bottom:10px;min-height:18px}
.btn-full{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:400;
  background:var(--ink);color:var(--bg);transition:background .2s;
}
.btn-full:hover{background:#333}

/* ── App shell ── */
#app{display:none;min-height:100vh}
.topbar{
  border-bottom:1px solid var(--border);background:rgba(13,12,11,.9);
  padding:0 32px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);
}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic}
.topbar-right{display:flex;gap:12px;align-items:center}
.tag{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);
     background:var(--accent-soft);padding:4px 10px;border-radius:20px;font-weight:400}
.logout-btn{
  background:none;border:1px solid var(--border-strong);cursor:pointer;
  padding:7px 14px;border-radius:8px;font-size:.8rem;color:var(--ink-soft);
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.logout-btn:hover{border-color:var(--ink-soft);color:var(--ink)}

main{max-width:780px;margin:0 auto;padding:48px 24px 80px}
.section-label{
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ink-soft);margin-bottom:16px;font-weight:400;
}

/* ── Poem editor ── */
.poem-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:28px 32px;margin-bottom:40px;
}
.poem-card textarea{
  width:100%;border:none;outline:none;background:transparent;resize:none;
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;
  font-weight:300;line-height:1.9;color:var(--ink-soft);
}
.poem-card textarea:focus{color:var(--ink)}
.poem-actions{display:flex;justify-content:flex-end;margin-top:12px;gap:10px;align-items:center}
.poem-status{font-size:.78rem;color:var(--accent);opacity:0;transition:opacity .4s}
.poem-status.show{opacity:1}
.btn-sm{
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:400;
  background:var(--ink);color:var(--bg);transition:background .2s;
}
.btn-sm:hover{background:#333}
.btn-sm.outline{background:transparent;border:1px solid var(--border-strong);color:var(--ink-soft)}
.btn-sm.outline:hover{border-color:var(--accent);color:var(--accent)}

/* ── Songs list ── */
.add-btn{
  width:100%;border:1.5px dashed var(--border-strong);border-radius:var(--r);
  padding:20px;text-align:center;cursor:pointer;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color .2s,background .2s,color .2s;margin-bottom:14px;
}
.add-btn:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.add-btn svg{width:16px;height:16px;stroke:currentColor}

#song-list{display:flex;flex-direction:column;gap:8px}
.song-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  animation:rise .4s cubic-bezier(.22,1,.36,1) both;
  transition:box-shadow .2s;
}
.song-row:hover{box-shadow:0 4px 20px rgba(0,0,0,.05)}
.drag-handle{color:var(--ink-faint);cursor:grab;flex-shrink:0;line-height:0}
.drag-handle:active{cursor:grabbing}
.song-num{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;
           color:var(--ink-faint);width:22px;text-align:right;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-title-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;
                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist-text{font-size:.78rem;color:var(--ink-soft)}
.song-badges{display:flex;gap:6px;flex-shrink:0}
.badge{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;
       border-radius:20px;font-weight:400}
.badge.lrc{background:var(--accent-soft);color:var(--accent)}
.badge.no-lrc{background:var(--border);color:var(--ink-faint)}
.del-btn{
  flex-shrink:0;background:none;border:none;cursor:pointer;
  padding:6px;border-radius:6px;color:var(--ink-faint);
  transition:background .2s,color .2s;
}
.del-btn:hover{background:var(--red-soft);color:var(--red)}

#empty-msg{
  text-align:center;padding:40px;font-family:'Cormorant Garamond',serif;
  font-style:italic;color:var(--ink-faint);font-size:1.05rem;
}

/* ── Modal ── */
#modal-bg{
  position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;
}
#modal-bg.open{display:flex}
#modal{
  background:var(--surface);border-radius:20px;padding:40px;
  width:100%;max-width:480px;box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:rise .3s cubic-bezier(.22,1,.36,1) both;
  max-height:90vh;overflow-y:auto;border:1px solid var(--border);
}
#modal h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;margin-bottom:24px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
             color:var(--ink-soft);margin-bottom:7px;font-weight:400}
.field input[type=text]{
  width:100%;border:1px solid var(--border-strong);border-radius:10px;
  padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;
  background:rgba(255,255,255,.04);color:var(--ink);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.drop-zone{
  border:1.5px dashed var(--border-strong);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;position:relative;
  transition:border-color .2s,background .2s;
}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--accent-soft)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone p{font-size:.83rem;color:var(--ink-soft);line-height:1.6}
.drop-zone .picked{font-size:.8rem;color:var(--accent);margin-top:5px;font-weight:400}
.modal-actions{display:flex;gap:10px;margin-top:28px}
.modal-btn{
  flex:1;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:400;
  transition:background .2s;
}
.modal-btn.primary{background:var(--ink);color:var(--bg)}
.modal-btn.primary:hover{background:#333}
.modal-btn.primary:disabled{background:#999;cursor:not-allowed}
.modal-btn.secondary{background:rgba(255,255,255,.07);color:var(--ink)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.12)}

/* ── Upload progress ── */
.upload-progress{
  height:3px;background:var(--border);border-radius:2px;margin-top:16px;overflow:hidden;display:none;
}
.upload-bar{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .3s}
.upload-status{font-size:.8rem;color:var(--ink-soft);margin-top:8px;text-align:center;display:none}

/* ── Toast ── */
#toast{
  position:fixed;bottom:32px;right:32px;z-index:999;
  background:var(--surface);color:var(--ink);border:1px solid var(--border-strong);
  padding:12px 20px;border-radius:10px;
  font-size:.85rem;font-weight:300;
  opacity:0;transform:translateY(10px);
  transition:opacity .3s,transform .3s;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateY(0)}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="gate">
  <div class="gate-card">
    <h1>Admin</h1>
    <p>Enter your password to manage the playlist</p>
    <input type="password" class="gate-input" id="gate-input" placeholder="••••••••" autocomplete="current-password"/>
    <p class="gate-err" id="gate-err"></p>
    <button class="btn-full" id="gate-btn">Unlock →</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">Playlist Admin</span>
    <div class="topbar-right">
      <span class="tag">Admin</span>
      <button class="logout-btn" id="logout-btn">Log out</button>
    </div>
  </div>

  <main>
    <!-- Poem editor -->
    <p class="section-label">Poem / Quote</p>
    <div class="poem-card">
      <textarea id="poem-ta" rows="5" placeholder="Write a poem or quote for your friend…"></textarea>
      <div class="poem-actions">
        <span class="poem-status" id="poem-status">Saved ✓</span>
        <button class="btn-sm" id="poem-save-btn">Save poem</button>
      </div>
    </div>

    <!-- Songs -->
    <p class="section-label">Songs</p>
    <button class="add-btn" id="add-btn">
      <svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Add a song
    </button>

    <div id="song-list">
      <div id="empty-msg">No songs yet — add the first one above.</div>
    </div>
  </main>
</div>

<!-- ── Add Song Modal ── -->
<div id="modal-bg">
  <div id="modal">
    <h2>Add a song</h2>
    <div class="field">
      <label>Song title</label>
      <input type="text" id="m-title" placeholder="e.g. Clair de Lune"/>
    </div>
    <div class="field">
      <label>Artist</label>
      <input type="text" id="m-artist" placeholder="e.g. Claude Debussy"/>
    </div>
    <div class="field">
      <label>Audio file (.mp3 / .wav / .flac / .ogg)</label>
      <div class="drop-zone" id="audio-drop">
        <input type="file" id="audio-file" accept="audio/*"/>
        <p>Drop audio file here or <strong>click to browse</strong></p>
        <p class="picked" id="audio-picked"></p>
      </div>
    </div>
    <div class="field">
      <label>Lyrics file (.lrc) — optional</label>
      <div class="drop-zone" id="lrc-drop">
        <input type="file" id="lrc-file" accept=".lrc,.txt"/>
        <p>Drop .lrc file here or <strong>click to browse</strong></p>
        <p class="picked" id="lrc-picked"></p>
      </div>
    </div>
    <div class="upload-progress" id="upload-prog"><div class="upload-bar" id="upload-bar"></div></div>
    <p class="upload-status" id="upload-status"></p>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-save">Upload &amp; add</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG — fill in these three values before opening the file
// ══════════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://cdaeebjrtuwwqbfpszqw.supabase.co';       // e.g. https://abcd1234.supabase.co
const SUPABASE_KEY  = 'sb_publishable_oS42Xu9Rb8JULVIl-i7zTA_heFE4JnC';  // from Project Settings > API
const ADMIN_PASS    = 'foryou2026';              // change to whatever you like
// ══════════════════════════════════════════════════════════════════

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Gate ─────────────────────────────────────────────────────────
const gateEl  = document.getElementById('gate');
const appEl   = document.getElementById('app');
const gateInput = document.getElementById('gate-input');
const gateErr   = document.getElementById('gate-err');

function tryUnlock() {
  if (gateInput.value === ADMIN_PASS) {
    sessionStorage.setItem('admin_ok','1');
    gateEl.style.display = 'none';
    appEl.style.display  = 'block';
    init();
  } else {
    gateErr.textContent = 'Incorrect password.';
    gateInput.value = '';
    gateInput.focus();
  }
}
document.getElementById('gate-btn').addEventListener('click', tryUnlock);
gateInput.addEventListener('keydown', e => e.key === 'Enter' && tryUnlock());
document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_ok');
  location.reload();
});
if (sessionStorage.getItem('admin_ok') === '1') {
  gateEl.style.display = 'none';
  appEl.style.display  = 'block';
  setTimeout(init, 0);
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── LRC Parser ────────────────────────────────────────────────────
function parseLRC(text) {
  const lines = text.split('\n');
  const result = [];
  const rx = /\[(\d{1,2}):(\d{2})\.(\d{2,3})\]/g;
  for (const line of lines) {
    rx.lastIndex = 0;
    const times = []; let m, last = 0;
    while ((m = rx.exec(line)) !== null) {
      const ms = m[3].length===3 ? parseInt(m[3]) : parseInt(m[3])*10;
      times.push(parseInt(m[1])*60 + parseInt(m[2]) + ms/1000);
      last = m.index + m[0].length;
    }
    const text2 = line.slice(last).trim();
    if (text2 && times.length) times.forEach(t => result.push({time:t,text:text2}));
  }
  return result.sort((a,b)=>a.time-b.time);
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  await loadPoem();
  await loadSongs();
}

// ── Poem ──────────────────────────────────────────────────────────
const poemTa = document.getElementById('poem-ta');
const poemStatus = document.getElementById('poem-status');

async function loadPoem() {
  const { data } = await sb.from('settings').select('value').eq('key','poem').maybeSingle();
  if (data) poemTa.value = data.value;
}
document.getElementById('poem-save-btn').addEventListener('click', async () => {
  await sb.from('settings').upsert({ key:'poem', value: poemTa.value });
  poemStatus.classList.add('show');
  setTimeout(()=>poemStatus.classList.remove('show'), 2500);
});

// ── Songs ─────────────────────────────────────────────────────────
let songs = [];

async function loadSongs() {
  const { data, error } = await sb.from('songs').select('*').order('position');
  if (error) { toast('Error loading songs'); return; }
  songs = data || [];
  renderSongs();
}

function renderSongs() {
  const list = document.getElementById('song-list');
  list.innerHTML = '';
  if (!songs.length) {
    list.innerHTML = '<div id="empty-msg">No songs yet — add the first one above.</div>';
    return;
  }
  songs.forEach((song, i) => {
    const row = document.createElement('div');
    row.className = 'song-row';
    row.draggable = true;
    row.dataset.id = song.id;
    row.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M4 8h16M4 16h16"/>
        </svg>
      </span>
      <span class="song-num">${i+1}</span>
      <div class="song-info">
        <div class="song-title-text">${song.title}</div>
        <div class="song-artist-text">${song.artist || 'Unknown artist'}</div>
      </div>
      <div class="song-badges">
        ${song.lrc_content ? '<span class="badge lrc">LRC ✓</span>' : '<span class="badge no-lrc">No lyrics</span>'}
      </div>
      <button class="del-btn" data-id="${song.id}" data-path="${song.storage_path}" title="Delete">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    `;
    row.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      deleteSong(song.id, song.storage_path);
    });
    list.appendChild(row);
  });
  setupDrag();
}

async function deleteSong(id, path) {
  if (!confirm('Remove this song from the playlist?')) return;
  await sb.from('songs').delete().eq('id', id);
  if (path) await sb.storage.from('songs').remove([path]);
  toast('Song removed');
  await loadSongs();
}

// ── Drag to reorder ───────────────────────────────────────────────
let dragSrc = null;
function setupDrag() {
  const rows = document.querySelectorAll('.song-row');
  rows.forEach(row => {
    row.addEventListener('dragstart', () => { dragSrc = row; row.style.opacity='.4'; });
    row.addEventListener('dragend',   () => { dragSrc = null; row.style.opacity='1'; });
    row.addEventListener('dragover',  e => { e.preventDefault(); row.style.outline='2px solid var(--accent)'; });
    row.addEventListener('dragleave', () => row.style.outline='');
    row.addEventListener('drop', async e => {
      e.preventDefault();
      row.style.outline='';
      if (!dragSrc || dragSrc===row) return;
      const list = document.getElementById('song-list');
      const rows2 = [...list.querySelectorAll('.song-row')];
      const fromIdx = rows2.indexOf(dragSrc);
      const toIdx   = rows2.indexOf(row);
      const moved = songs.splice(fromIdx, 1)[0];
      songs.splice(toIdx, 0, moved);
      renderSongs();
      // persist order
      await Promise.all(songs.map((s,i) => sb.from('songs').update({position:i}).eq('id',s.id)));
    });
  });
}

// ── Upload Modal ──────────────────────────────────────────────────
const modalBg  = document.getElementById('modal-bg');
const mTitle   = document.getElementById('m-title');
const mArtist  = document.getElementById('m-artist');
const audioFile= document.getElementById('audio-file');
const lrcFile  = document.getElementById('lrc-file');
const audioPicked = document.getElementById('audio-picked');
const lrcPicked   = document.getElementById('lrc-picked');
const progWrap = document.getElementById('upload-prog');
const progBar  = document.getElementById('upload-bar');
const progStatus= document.getElementById('upload-status');
const saveBtn  = document.getElementById('modal-save');

let pendingAudio = null, pendingLrc = null;

document.getElementById('add-btn').addEventListener('click', openModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if(e.target===modalBg) closeModal(); });

function openModal() {
  mTitle.value=''; mArtist.value='';
  audioPicked.textContent=''; lrcPicked.textContent='';
  audioFile.value=''; lrcFile.value='';
  pendingAudio=null; pendingLrc=null;
  progWrap.style.display='none'; progBar.style.width='0%';
  progStatus.style.display='none';
  saveBtn.disabled=false;
  modalBg.classList.add('open');
  setTimeout(()=>mTitle.focus(),80);
}
function closeModal() { modalBg.classList.remove('open'); }

audioFile.addEventListener('change', () => {
  const f = audioFile.files[0]; if(!f) return;
  pendingAudio = f;
  audioPicked.textContent = f.name;
  if (!mTitle.value) mTitle.value = f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
});
lrcFile.addEventListener('change', () => {
  const f = lrcFile.files[0]; if(!f) return;
  pendingLrc = f;
  lrcPicked.textContent = f.name;
});

['audio-drop','lrc-drop'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('over'); });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', () => el.classList.remove('over'));
});

saveBtn.addEventListener('click', async () => {
  if (!pendingAudio) { toast('Please select an audio file'); return; }
  const title  = mTitle.value.trim() || pendingAudio.name.replace(/\.[^.]+$/,'');
  const artist = mArtist.value.trim();

  saveBtn.disabled = true;
  progWrap.style.display='block';
  progStatus.style.display='block';

  // 1. Upload audio
  progStatus.textContent = 'Uploading audio…';
  progBar.style.width = '20%';
  const ext  = pendingAudio.name.split('.').pop();
  const path = `audio/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const { error: upErr } = await sb.storage.from('songs').upload(path, pendingAudio, {
    contentType: pendingAudio.type, upsert: false
  });
  if (upErr) { toast('Upload failed: ' + upErr.message); saveBtn.disabled=false; return; }
  progBar.style.width = '65%';

  // 2. Get public URL
  const { data: { publicUrl } } = sb.storage.from('songs').getPublicUrl(path);

  // 3. Read LRC
  let lrc_content = '';
  if (pendingLrc) {
    progStatus.textContent = 'Reading lyrics…';
    lrc_content = await pendingLrc.text();
  }
  progBar.style.width = '85%';

  // 4. Insert DB row
  progStatus.textContent = 'Saving…';
  const position = songs.length;
  const { error: dbErr } = await sb.from('songs').insert({
    title, artist, audio_url: publicUrl, storage_path: path, lrc_content, position
  });
  if (dbErr) { toast('DB error: ' + dbErr.message); saveBtn.disabled=false; return; }

  progBar.style.width = '100%';
  progStatus.textContent = 'Done!';
  setTimeout(() => {
    closeModal();
    toast(`"${title}" added!`);
    loadSongs();
  }, 600);
});
</script>
</body>
</html>
